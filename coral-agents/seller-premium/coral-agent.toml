edition = 4

[agent]
name = "seller-premium"
version = "0.1.0"
description = "Marketplace seller persona - competes on verified quality over price. Reuses the seller-agent image."
summary = "A premium specialist that wins on verified quality."
readme = "Bids higher in the shared market thread, competing on verified quality over price. Same image as seller-agent; AGENT_NAME + FLOOR_SOL + PERSONA shape it."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "seller-premium", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "txline", description = "Inventory" }
FLOOR_SOL = { type = "f64", default = 0.0005, description = "Cost floor - higher, wins on verified quality" }
PERSONA = { type = "string", default = "a premium seller who competes on verified quality over price", description = "Bidding persona (LLM system prompt)" }
SERVICE = { type = "string", default = "txline", description = "What deliverService returns" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key - set with LLM_PROVIDER=openai" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log settlement checks" }

[runtimes.docker]
image = "seller-agent:0.1.0"
